<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dark Ascension Banner</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* itch.io cover: 630x500. We render at 2x for sharpness. */
    body {
        width: 1260px;
        height: 1000px;
        overflow: hidden;
        font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    }

    .banner {
        width: 1260px;
        height: 1000px;
        background: #0a0a12;
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        overflow: hidden;
    }

    /* Radial purple glow — top center */
    .banner::before {
        content: "";
        position: absolute;
        top: -30%;
        left: 50%;
        transform: translateX(-50%);
        width: 1000px;
        height: 1000px;
        background: radial-gradient(circle, rgba(123, 104, 238, 0.25) 0%, rgba(155, 48, 255, 0.08) 40%, transparent 70%);
        pointer-events: none;
    }

    /* Secondary glow — bottom */
    .banner::after {
        content: "";
        position: absolute;
        bottom: -40%;
        left: 50%;
        transform: translateX(-50%);
        width: 1200px;
        height: 800px;
        background: radial-gradient(ellipse, rgba(74, 108, 247, 0.12) 0%, transparent 60%);
        pointer-events: none;
    }

    /* Subtle grid pattern overlay */
    .grid-overlay {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background-image:
            linear-gradient(rgba(123, 104, 238, 0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(123, 104, 238, 0.03) 1px, transparent 1px);
        background-size: 60px 60px;
        pointer-events: none;
    }

    /* Floating orbs */
    .orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(40px);
        pointer-events: none;
    }
    .orb-1 {
        width: 200px; height: 200px;
        background: rgba(123, 104, 238, 0.15);
        top: 15%; left: 8%;
    }
    .orb-2 {
        width: 150px; height: 150px;
        background: rgba(155, 48, 255, 0.12);
        top: 60%; right: 10%;
    }
    .orb-3 {
        width: 120px; height: 120px;
        background: rgba(255, 215, 0, 0.08);
        bottom: 20%; left: 20%;
    }
    .orb-4 {
        width: 100px; height: 100px;
        background: rgba(0, 212, 255, 0.08);
        top: 25%; right: 20%;
    }

    /* Content */
    .content {
        position: relative;
        z-index: 2;
    }

    /* Moon/icon glyph */
    .icon-glyph {
        font-size: 72px;
        margin-bottom: 24px;
        display: block;
        filter: drop-shadow(0 0 30px rgba(123, 104, 238, 0.6));
    }

    .title {
        font-size: 96px;
        font-weight: 800;
        letter-spacing: -1px;
        line-height: 1;
        margin-bottom: 16px;
        background: linear-gradient(180deg, #f0f0ff 0%, #7b68ee 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        filter: drop-shadow(0 4px 30px rgba(123, 104, 238, 0.4));
    }

    .subtitle {
        font-size: 32px;
        font-weight: 600;
        color: #ffd700;
        letter-spacing: 6px;
        text-transform: uppercase;
        margin-bottom: 40px;
        text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
    }

    .tagline {
        font-size: 24px;
        color: #8888aa;
        font-weight: 400;
        letter-spacing: 1px;
        max-width: 700px;
        line-height: 1.5;
    }

    /* Bottom badges */
    .badges {
        position: absolute;
        bottom: 48px;
        left: 0;
        right: 0;
        display: flex;
        justify-content: center;
        gap: 32px;
        z-index: 2;
    }

    .badge {
        display: flex;
        align-items: center;
        gap: 8px;
        background: rgba(26, 26, 46, 0.8);
        border: 1px solid #2a2a4a;
        border-radius: 8px;
        padding: 10px 20px;
        font-size: 16px;
        font-weight: 600;
        color: #3ddc84;
    }

    /* Decorative border lines */
    .border-top, .border-bottom {
        position: absolute;
        left: 60px;
        right: 60px;
        height: 1px;
        z-index: 2;
    }
    .border-top {
        top: 48px;
        background: linear-gradient(90deg, transparent, rgba(123, 104, 238, 0.4), transparent);
    }
    .border-bottom {
        bottom: 120px;
        background: linear-gradient(90deg, transparent, rgba(123, 104, 238, 0.2), transparent);
    }

    /* Corner accents */
    .corner {
        position: absolute;
        width: 40px;
        height: 40px;
        z-index: 2;
    }
    .corner-tl { top: 36px; left: 48px; border-top: 2px solid rgba(123, 104, 238, 0.5); border-left: 2px solid rgba(123, 104, 238, 0.5); }
    .corner-tr { top: 36px; right: 48px; border-top: 2px solid rgba(123, 104, 238, 0.5); border-right: 2px solid rgba(123, 104, 238, 0.5); }
    .corner-bl { bottom: 108px; left: 48px; border-bottom: 2px solid rgba(123, 104, 238, 0.5); border-left: 2px solid rgba(123, 104, 238, 0.5); }
    .corner-br { bottom: 108px; right: 48px; border-bottom: 2px solid rgba(123, 104, 238, 0.5); border-right: 2px solid rgba(123, 104, 238, 0.5); }
</style>
</head>
<body>
<div class="banner">
    <div class="grid-overlay"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>

    <div class="border-top"></div>
    <div class="border-bottom"></div>
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="content">
        <span class="icon-glyph">&#127769;</span>
        <div class="title">Dark Ascension</div>
        <div class="subtitle">Dark Fantasy Idle RPG</div>
        <div class="tagline">Embrace the darkness and ascend to ultimate power</div>
    </div>

    <div class="badges">
        <div class="badge">&#10003; No Ads</div>
        <div class="badge">&#10003; No Tracking</div>
        <div class="badge">&#10003; 100% Offline</div>
        <div class="badge">&#10003; Free</div>
    </div>
</div>
</body>
</html>
